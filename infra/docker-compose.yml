version: '3.8'

services:
  postgres:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ../services/api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../services/api/.env
  executor:
    build: ../services/executor
    ports:
      - "8001:8001"
    env_file:
      - ../services/executor/.env
    environment:
      DOCKER_API_VERSION: "1.43"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data: