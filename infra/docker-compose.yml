version: '3.8'

services:
  postgres:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ../services/api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../services/api/.env
  executor:
    build: ../services/executor
    ports:
      - "8001:8001"
    env_file:
      - ../services/executor/.env
    environment:
      DOCKER_API_VERSION: "1.43"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/var/www/frontend
    command: sh -c "rm -rf /var/www/frontend/* && cp -r /frontend/dist/* /var/www/frontend/ && tail -f /dev/null"
    depends_on:
      - app

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/var/www/frontend:ro
    depends_on:
      - frontend
      - app

volumes:
  postgres_data:
  frontend_dist: